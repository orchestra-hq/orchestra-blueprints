name: Daily Quality Fixes

"on":
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: daily-quality-fixes
  cancel-in-progress: false

jobs:
  daily-quality-fixes:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install validation and lint tools
        run: |
          python -m pip install --upgrade pip
          pip install orchestra-cli yamllint ruff

      - name: Apply auto-fixes
        run: |
          ruff check . --fix --exclude worktrees || true
          ruff format . --exclude worktrees

      - name: Validate repository after auto-fixes
        run: |
          make validate
          ruff check . --exclude worktrees
          ruff format --check . --exclude worktrees

      - name: Detect changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          base: main
          branch: automation/daily-quality-fixes
          commit-message: Apply daily repository quality fixes
          committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
          delete-branch: true
          draft: false
          title: Apply daily repository quality fixes
          body: |
            # Objective
            Keep repository quality checks green

            ## Changes
            - Apply automated lint and formatting fixes
            - Re-run repository validation before opening the update

            ## Testing
            GitHub Actions reruns the repository quality gates after the fixes

            ## Checklist
            - [ ] Verified these changes are backwards compatible (db migrations, model updates)

            ## Additional Notes
