name: Reusable Quality Gates

on:
  workflow_call:
    inputs:
      run_ruff_format:
        type: boolean
        required: false
        default: false
      run_pip_audit:
        type: boolean
        required: false
        default: false
      pip_audit_requirements_path:
        type: string
        required: false
        default: python/requirements.txt

jobs:
  quality-gates:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install validation and lint tools
        run: |
          python -m pip install --upgrade pip
          pip install orchestra-cli yamllint ruff pip-audit
      - name: Run repository validation gate
        run: make validate
      - name: Run Ruff lint gate
        run: ruff check . --exclude worktrees
      - name: Run Ruff format gate
        if: ${{ inputs.run_ruff_format }}
        run: ruff format --check . --exclude worktrees
      - name: Run dependency vulnerability audit
        if: ${{ inputs.run_pip_audit }}
        run: pip-audit -r ${{ inputs.pip_audit_requirements_path }}
