name: Test orchestra-hq/run-pipeline action

on:
  pull_request:
    branches:
      - main
    paths:
      - "orchestra/aws_glue_fivetran_dbt_lakehouse_demo.yml"
      - "dbt_projects/snowflake/models/**"
  push:
    branches:
      - main
    paths:
      - "orchestra/aws_glue_fivetran_dbt_lakehouse_demo.yml"
      - "dbt_projects/snowflake/models/**"
  workflow_dispatch:

jobs:
  quality-gates:
    uses: ./.github/workflows/reusable-quality-gates.yml

  test-action:
    needs: quality-gates
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Run impact analysis
        uses: orchestra-hq/run-pipeline@v1
        with:
          api_key: ${{ secrets.ORCHESTRA_API_KEY }}
          pipeline_id: dcf31335-c158-41a2-8626-6c901841bc3e
          poll_interval: 20
          environment: ${{ github.event_name == 'pull_request' && 'Staging' || 'Production' }}
          run_inputs: |
                {
                  "branch": "${{ github.head_ref || github.ref_name }}",
                  "repo": "${{ github.repository }}",
                  "pr_number": "${{ github.event.pull_request.number || '' }}"
                }
      - name: Run dbt in stage
        uses: orchestra-hq/run-pipeline@v1
        with:
          api_key: ${{ secrets.ORCHESTRA_API_KEY }}
          pipeline_id: 56198c16-de65-4b08-a566-7d69cff12501
          poll_interval: 20
          environment: ${{ github.event_name == 'pull_request' && 'Staging' || 'Production' }}
          task_ids: 21ce3ced-4acc-4380-b122-24806e6c4243
          run_inputs: |
            {
              "dbt_command": " build -s state:modified+ --defer --state latest_production --exclude tag:metadata",
              "dbt_branch": "${{ github.head_ref }}"
            }
