# .azure/register-orchestra-pipelines.yml
#
# Azure DevOps pipeline that automatically REGISTERS new Orchestra pipeline
# YAMLs (anything added under orchestra/) to the Orchestra platform.
#
# The "clever" bit: the alias is derived directly from the YAML file name —
# the file name (minus its .yml/.yaml extension) is slugified into a clean,
# lower-case, hyphenated Orchestra alias. So orchestra/dbt/snowflake/basic.yml
# is registered under the alias "basic", and My_Cool_Pipeline.yaml -> "my-cool-pipeline".
#
# Setup:
#   * Add a SECRET pipeline variable (or variable group) named ORCHESTRA_API_KEY.
#     Use a standard (write-enabled) Orchestra API key.
#   * The Orchestra CLI `import` command creates Git-backed pipelines, so each new
#     file is registered once when it first lands on main.

trigger:
  branches:
    include:
      - main
  paths:
    include:
      - orchestra/**

pr: none

pool:
  vmImage: ubuntu-latest

variables:
  - name: pythonVersion
    value: '3.12'

steps:
  - checkout: self
    fetchDepth: 0
    displayName: Checkout repo (full history)

  - task: UsePythonVersion@0
    displayName: Set up Python
    inputs:
      versionSpec: $(pythonVersion)

  - script: |
      python -m pip install --upgrade pip
      pip install orchestra-cli
    displayName: Install Orchestra CLI

  - script: |
      set -euo pipefail

      CURRENT="$BUILD_SOURCEVERSION"
      if git rev-parse "${CURRENT}^1" >/dev/null 2>&1; then
        BASE="${CURRENT}^1"
      else
        # First commit on the branch: diff against the empty tree
        BASE="$(git hash-object -t tree /dev/null)"
      fi

      echo "Looking for newly ADDED Orchestra YAMLs in ${BASE}..${CURRENT}"
      mapfile -t FILES < <(
        git diff --name-only --diff-filter=A "$BASE" "$CURRENT" -- 'orchestra/' \
          | grep -E '\.ya?ml$' || true
      )

      if [ "${#FILES[@]}" -eq 0 ]; then
        echo "No new Orchestra pipeline YAMLs to register. Done."
        exit 0
      fi

      for file in "${FILES[@]}"; do
        [ -f "$file" ] || { echo "Skipping missing file: $file"; continue; }

        # --- Turn the YAML file name into a clean Orchestra alias ---
        base="$(basename "$file")"      # e.g. My_Cool_Pipeline.yaml
        name="${base%.yaml}"            # strip .yaml ...
        name="${name%.yml}"            # ... or .yml
        alias="$(printf '%s' "$name" \
          | tr '[:upper:]' '[:lower:]' \
          | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//')"

        echo "Registering '$file' -> alias '$alias'"
        orchestra import --alias "$alias" --path "$file" --working-branch main
      done
    displayName: Register new Orchestra pipelines
    env:
      ORCHESTRA_API_KEY: $(ORCHESTRA_API_KEY)
