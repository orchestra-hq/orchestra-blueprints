version: v1
name: 'dbt Clickhouse - State Aware #dbt #clickhouse #state-aware #sao'
pipeline:
  c3d4e5f6-a7b8-49ca-bd3e-4f5a6b7c8d9e:
    tasks:
      d4e5f6a7-b8c9-4acb-be4f-5a6b7c8d9e0f:
        integration: DBT_CORE
        integration_job: DBT_CORE_EXECUTE
        parameters:
          commands: dbt parse
          package_manager: PIP
          python_version: '3.12'
          use_state_orchestration: true
          project_dir: dbt_projects/clickhouse
          shallow_clone_dirs: dbt_projects/clickhouse
        depends_on: []
        name: dbt build
        connection: ${{ ENV.DBT_CORE_CLICKHOUSE }}
    depends_on: []
    name: group
webhook:
  enabled: false
