version: v1
name: 'Snowflake Processing Pipeline #dbt #snowflake'
pipeline:
  a5f366a8-5618-4ee5-812b-841a6fbad169:
    tasks:
      38ca71c9-5db9-4b46-8275-5391cd4bccfd:
        integration: SNOWFLAKE
        integration_job: SNOWFLAKE_RUN_QUERY
        parameters:
          statement: 'Select ''${{ MATRIX.tables }}'' as table_name '
          set_outputs: false
        depends_on: []
        name: Process data
        connection: ${{ ENV.SNOWFLAKE_CONNECTION }}
    depends_on: []
    name: group
    matrix:
      inputs:
        tables:
        - table_1
        - table_2
  c01ef13f-8719-401e-810e-c8c39c969445:
    tasks:
      905c51be-27f9-4715-8569-6e9c54919f7e:
        integration: DBT_CORE
        integration_job: DBT_CORE_EXECUTE
        parameters:
          commands: dbt ${{ inputs.dbt_command }}
          package_manager: PIP
          python_version: '3.12'
          branch: ${{ inputs.dbt_branch }}
          project_dir: dbt_projects/snowflake
          shallow_clone_dirs: dbt_projects/snowflake
        depends_on: []
        name: dbt build
        connection: ${{ ENV.DBT_CORE_SNOWFLAKE }}
    depends_on:
    - a5f366a8-5618-4ee5-812b-841a6fbad169
    name: group
webhook:
  enabled: false
inputs:
  dbt_command:
    type: string
    default: build
  dbt_branch:
    type: string
    default: main
alerts:
- name: Teams
  statuses:
  - FAILED
  destinations:
  - integration: MICROSOFT_TEAMS
    connection_id: migrated_teams_66347
meta:
  notes: >-
    Runs the dbt_projects/snowflake project. Parameterised with inputs so the
    dbt command and the branch dbt clones can be set per run. Defaults are
    intentionally not branch/PR-relative: dbt_command=build, dbt_branch=main.
    Override dbt_branch at run time (e.g. a feature branch) to test changes
    without changing the pipeline defaults.
