            \            (\"ORCHESTRA_TASK_RUN_ID\",      TASK_RUN_ID),\n        ]\
            \ if not val\n    ]\n    if missing:\n        print(f\"[monitor] Missing\
            \ required env vars: {', '.join(missing)}\")\n        sys.exit(1)\n\n\
            \    if not ERROR_WEBHOOK:\n        print(\n            \"[monitor] \u26A0\
            \uFE0F  ERROR_WEBHOOK_URL not set \u2014 logs will print but no webhook\
