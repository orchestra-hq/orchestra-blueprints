            \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
            \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
            \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
            \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
            \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ndef validate_config():\n\
            \    missing = [\n        name for name, val in [\n            (\"ORCHESTRA_API_KEY\"\
