            \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
            \u2500\u2500\n\ndef process_line(line):\n    \"\"\"\n    Print the line.\
            \ Return True if it looks like dbt has finished.\n    Fire a Slack alert\
