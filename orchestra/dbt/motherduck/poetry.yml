            \ \"30\"))\nIDLE_TIMEOUT     = float(os.getenv(\"IDLE_TIMEOUT_SEC\", \"\
            300\"))\nLOG_DISCOVERY_TIMEOUT = float(os.getenv(\"LOG_DISCOVERY_TIMEOUT_SEC\"\
