            \    resp.raise_for_status()\n    return b\"\"\n\n\n# \u2500\u2500 Webhook\
            \ \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
            \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
            \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
            \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
            \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\
            \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\n\ndef send_webhook_alert(error_line):\n\
            \    global _last_slack_time\n\n    with _lock:\n        now = time.time()\n\
