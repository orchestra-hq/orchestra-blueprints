version: v1
name: dbt core__
pipeline:
  dbt_core_snowflake_group:
    tasks:
      run_dbt_core_snowflake:
        integration: DBT_CORE
        integration_job: DBT_CORE_EXECUTE
        parameters:
          commands: dbt ${{ inputs.dbt_command }}
          package_manager: PIP
          python_version: '3.12'
          use_state_orchestration: true
          branch: ${{ inputs.dbt_branch }}
          project_dir: dbt_Projects/snowflake
          shallow_clone_dirs: dbt_Projects/snowflake
        depends_on: []
        name: Run dbt Core on Snowflake
        connection: dbt_snowflake_blueprints_prod_07025
    depends_on: []
    name: dbt Core (Snowflake)
schedule:
- name: Daily at 9am
  cron: 0 9 ? * * *
  timezone: Europe/London
webhook:
  enabled: false
inputs:
  dbt_command:
    type: string
    default: build --select state:modified+ --defer
  dbt_branch:
    type: string
    default: main
meta:
  notes: Runs dbt Core against Snowflake with state orchestration enabled (use_state_orchestration),
    so Orchestra uses existing model state to optimise the execution flow. Command
    and branch are parameterised via inputs.
