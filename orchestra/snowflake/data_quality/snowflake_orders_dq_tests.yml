version: v1
name: 'SNOWFLAKE_ORDERS Data Quality Tests #snowflake #dataquality'
pipeline:
  not_null_tests:
    tasks:
      check_not_null:
        integration: SNOWFLAKE
        integration_job: SNOWFLAKE_RUN_TEST
        parameters:
          statement: 'select * from BIGQUERY_SAMPLE.PUBLIC_CLEAN.${{ MATRIX.dq_inputs[''table'']
            }} where ${{ MATRIX.dq_inputs[''column''] }} is null limit 100'
          error_threshold_expression: '> 0'
          warn_threshold_expression: '> 0'
        depends_on: []
        name: Not Null test
        connection: ${{ ENV.SNOWFLAKE_CONNECTION }}
    depends_on: []
    name: Not Null Tests
    matrix:
      inputs:
        dq_inputs:
        - { table: SNOWFLAKE_ORDERS_CLEAN, column: _PK }
        - { table: SNOWFLAKE_ORDERS_CLEAN, column: ORDER_NUMBER }
        - { table: SNOWFLAKE_ORDERS_CLEAN, column: ITEM_SK_ID }
        - { table: SNOWFLAKE_ORDERS_CLEAN, column: QUANTITY }
        - { table: SNOWFLAKE_ORDERS_CLEAN, column: COST }
        - { table: SNOWFLAKE_ORDERS_CLEAN, column: BILL_CUTOMER_SK_ID }
        - { table: SNOWFLAKE_ORDERS_CLEAN, column: SHIP_CUSTOMER_SK_ID }
        - { table: SNOWFLAKE_ORDERS_CLEAN, column: SOLD_DATE }
        - { table: SNOWFLAKE_ORDERS_CLEAN, column: SHIP_DATE }
  uniqueness_tests:
    tasks:
      check_unique:
        integration: SNOWFLAKE
        integration_job: SNOWFLAKE_RUN_TEST
        parameters:
          statement: 'select ${{ MATRIX.dq_inputs[''column''] }}, count(*) as duplicate_count
            from BIGQUERY_SAMPLE.PUBLIC_CLEAN.${{ MATRIX.dq_inputs[''table''] }} group
            by ${{ MATRIX.dq_inputs[''column''] }} having count(*) > 1 limit 100'
          error_threshold_expression: '> 0'
          warn_threshold_expression: '> 0'
        depends_on: []
        name: Uniqueness test
        connection: ${{ ENV.SNOWFLAKE_CONNECTION }}
    depends_on:
    - not_null_tests
    condition: ${{ task_groups['not_null_tests'].all().status == 'COMPLETED' }}
    name: Uniqueness Tests
    matrix:
      inputs:
        dq_inputs:
        - { table: SNOWFLAKE_ORDERS_CLEAN, column: _PK }
        - { table: SNOWFLAKE_ORDERS_CLEAN, column: ORDER_NUMBER }
  timestamp_tests:
    tasks:
      check_timestamp:
        integration: SNOWFLAKE
        integration_job: SNOWFLAKE_RUN_TEST
        parameters:
          statement: 'select * from BIGQUERY_SAMPLE.PUBLIC_CLEAN.${{ MATRIX.dq_inputs[''table'']
            }} where ${{ MATRIX.dq_inputs[''condition''] }} limit 100'
          error_threshold_expression: '> 0'
          warn_threshold_expression: '> 0'
        depends_on: []
        name: Timestamp test
        connection: ${{ ENV.SNOWFLAKE_CONNECTION }}
    depends_on:
    - uniqueness_tests
    condition: ${{ task_groups['uniqueness_tests'].all().status == 'COMPLETED' }}
    name: Timestamp Tests
    matrix:
      inputs:
        dq_inputs:
        - { table: SNOWFLAKE_ORDERS_CLEAN, condition: 'SOLD_DATE > current_timestamp()' }
        - { table: SNOWFLAKE_ORDERS_CLEAN, condition: 'SHIP_DATE > current_timestamp()' }
        - { table: SNOWFLAKE_ORDERS_CLEAN, condition: 'SHIP_DATE < SOLD_DATE' }
        - { table: SNOWFLAKE_ORDERS_CLEAN, condition: 'year(SOLD_DATE) < 2000' }
        - { table: SNOWFLAKE_ORDERS_CLEAN, condition: 'year(SHIP_DATE) < 2000' }
  numeric_range_tests:
    tasks:
      check_numeric_range:
        integration: SNOWFLAKE
        integration_job: SNOWFLAKE_RUN_TEST
        parameters:
          statement: 'select * from BIGQUERY_SAMPLE.PUBLIC_CLEAN.${{ MATRIX.dq_inputs[''table'']
            }} where ${{ MATRIX.dq_inputs[''condition''] }} limit 100'
          error_threshold_expression: '> 0'
          warn_threshold_expression: '> 0'
        depends_on: []
        name: Numeric Range test
        connection: ${{ ENV.SNOWFLAKE_CONNECTION }}
    depends_on:
    - timestamp_tests
    condition: ${{ task_groups['timestamp_tests'].all().status == 'COMPLETED' }}
    name: Numeric Range Tests
    matrix:
      inputs:
        dq_inputs:
        - { table: SNOWFLAKE_ORDERS_CLEAN, condition: 'QUANTITY < 0' }
        - { table: SNOWFLAKE_ORDERS_CLEAN, condition: 'QUANTITY > 100000' }
        - { table: SNOWFLAKE_ORDERS_CLEAN, condition: 'COST < 0' }
        - { table: SNOWFLAKE_ORDERS_CLEAN, condition: 'COST > 1000000' }
schedule:
- name: Daily at 8am
  cron: 0 8 ? * MON-FRI *
  timezone: Europe/London
webhook:
  enabled: false
alerts:
- name: Failures
  statuses:
  - FAILED
  - WARNING
  destinations:
  - integration: SLACK
    destination: alert-testing
