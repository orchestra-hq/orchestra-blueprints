version: v1
name: Complex Orchestra Pipeline
pipeline:
  initialTaskGroup:
    tasks:
      startTask:
        integration: AIRBYTE_CLOUD
        integration_job: AIRBYTE_CLOUD_JOB
        parameters:
          connection_id: example_connection_id
          job_type: sync
        depends_on: []
        name: Start Task
        connection: airbyte_connection_12345
        configuration:
          retries: 2
          retry_delay: 5
    depends_on:
    - 32266142-4e80-41f7-9c4c-bbf5f024f9bc
    name: Initial Task Group
  parallelProcessingGroup:
    tasks:
      processTask1:
        integration: AWS_LAMBDA
        integration_job: AWS_LAMBDA_EXECUTE_ASYNC_FUNCTION
        parameters:
          function_name: process_lambda_1
          payload: '{"key": "value"}'
          set_outputs: true
        depends_on: []
        name: Process Task 1
      processTask2:
        integration: FIVETRAN
        integration_job: FIVETRAN_SYNC_ALL
        parameters:
          connector_id: example_connector_id
        depends_on: []
        name: Process Task 2
    depends_on:
    - initialTaskGroup
    name: Parallel Processing Group
  finalTaskGroup:
    tasks:
      endTask:
        integration: SNOWFLAKE
        integration_job: SNOWFLAKE_RUN_QUERY
        parameters:
          statement: SELECT * FROM final_table WHERE status = 'complete';
          set_outputs: true
        depends_on: []
        name: End Task
    depends_on:
    - parallelProcessingGroup
    name: Final Task Group
  32266142-4e80-41f7-9c4c-bbf5f024f9bc:
    tasks:
      38e0b377-da9e-42bc-af8f-38708407ab57:
        integration: PYTHON
        integration_job: PYTHON_EXECUTE_SCRIPT
        parameters:
          package_manager: PIP
          python_version: '3.12'
          build_command: pip install -r requirements.txt
          environment_variables: '{

            "SHEET_NAME": "${{ MATRIX.gsheets[''SHEET_NAME''] }}",


            "TABLE_NAME":"${{ MATRIX.gsheets[''TABLE_NAME''] }}"


            }'
          set_outputs: false
          source: GIT
          command: python -m run_dlt_pipelines
          branch: ${{ inputs.python_branch }}
          project_dir: python/dlt
          shallow_clone_dirs: python/dlt
        depends_on: []
        name: Some arbitrary python
      cc7e6c6f-6ce4-4679-b135-e8be243c209f:
        integration: ORCHESTRA
        integration_job: APPROVAL
        parameters: {}
        depends_on: []
        name: group
    depends_on: []
    name: group
    matrix:
      inputs:
        gsheets:
        - SHEET_NAME: 1H0UnZ1vJ6WSsZgiVkg96zq52p7qaXkhvodlO1Mzoj6s
          TABLE_NAME: dbt_leads
        - SHEET_NAME: 1TMNhQFZbmaBsa1vIehQzh3vdyfc05damwJ_PIKDF14A
          TABLE_NAME: social_leads
        - SHEET_NAME: 1tImqLq_zLNthL7DDUkTUjU0xHoV_PhdM1zpuJ
          TABLE_NAME: unstructured_feedback
      sequential: true
schedule:
- name: Weekly Schedule
  cron: 0 9 ? * MON *
  timezone: America/New_York
  environment: production
  run_inputs:
    example: weekly_run
sensors:
  exampleSensor:
    name: Example Sensor
    cron: 0 12 ? * * *
    timezone: UTC
    timeout_mins: 10
    environments:
    - development
    checks:
      Snowflake Check:
        integration: SNOWFLAKE
        sensor_type: SNOWFLAKE_QUERY
        parameters:
          query: SELECT COUNT(*) FROM sensor_table WHERE condition = true;
        map_outputs:
          custom: ${{ outputs.results[0][0] }}
    run_inputs:
      example: sensor_trigger
    alerts:
    - name: Failures
      statuses:
      - FAILED
      destinations:
      - integration: SLACK
        destination: alerts-data
        connection_id: default_00000
trigger_events:
- type: pipeline
  pipeline_id: '*'
  run_inputs:
    example: event_trigger
webhook:
  enabled: true
  run_inputs:
    example: webhook_trigger
inputs:
  example:
    type: string
    default: default_value
  python_branch:
    type: string
    default: main
meta:
  notes: This is a complex pipeline designed to simulate  abunch of annoying edge
    cases
