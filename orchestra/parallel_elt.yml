version: v1
name: 'Parallel ELT #dbt #snowflake #airbyte #snowflake #python #powerbi #tableau'
pipeline:
  ef92b6c1-86d3-4145-a8c4-c6f5ba6b2a45:
    tasks:
      fea7c0ea-0900-4d41-a600-1bdb40f2cfc0:
        integration: PYTHON
        integration_job: PYTHON_EXECUTE_SCRIPT
        parameters:
          package_manager: PIP
          python_version: '3.12'
          build_command: pip install -r requirements.txt
          environment_variables: '{

            "SHEET_NAME": "${{ MATRIX.gsheets[''SHEET_NAME''] }}",


            "TABLE_NAME":"${{ MATRIX.gsheets[''TABLE_NAME''] }}"


            }'
          set_outputs: false
          source: GIT
          command: python -m run_dlt_pipelines
          project_dir: dlt
          shallow_clone_dirs: dlt
        depends_on: []
        name: Execute parallel dlt_
        connection: python__production__blueprints__19239
    depends_on: []
    name: ''
    matrix:
      inputs:
        gsheets:
        - SHEET_NAME: 1H0UnZ1vJ6WSsZgiVkg96zq52p7qaXkhvodlO1Mzoj6s
          TABLE_NAME: dbt_leads
        - SHEET_NAME: 1TMNhQFZbmaBsa1vIehQzh3vdyfc05damwJ_PIKDF14A
          TABLE_NAME: social_leads
        - SHEET_NAME: 1tImqLq_zLNthL7DDUkTUjU0xHoV_PhdM1zpuJ
          TABLE_NAME: unstructured_feedback
  d8b994fa-c6cf-430e-9606-6c02109e1da8:
    tasks:
      2a1919de-e48d-4933-8c0e-6a24325b9404:
        integration: POWER_BI
        integration_job: POWER_BI_REFRESH_DATASET
        parameters:
          dataset_id: 5e83dd8a-2c30-44ec-8f53-e5e751ae515d
        depends_on: []
        name: Refresh Dataset
      6fc1cdc7-429d-4345-a67a-4b213291370b:
        integration: TABLEAU_CLOUD
        integration_job: TABLEAU_REFRESH_EXTRACT
        parameters:
          project_name: core_data
          datasource_name: customers
        depends_on: []
        name: Refresh Extract
    depends_on:
    - e11aeb30-cb66-4ace-8eee-f91b395c5675
    condition: ${{ task_groups['e11aeb30-cb66-4ace-8eee-f91b395c5675'].all().status
      in ['SUCCEEDED', 'WARNING'] and inputs.environment == 'Production' }}
    name: ''
  e11aeb30-cb66-4ace-8eee-f91b395c5675:
    tasks:
      999ae093-9fa9-4a61-acff-9300820661a2:
        integration: DBT_CORE
        integration_job: DBT_CORE_EXECUTE
        parameters:
          commands: dbt ${{ inputs.dbt_command }}
          package_manager: PIP
          python_version: '3.12'
          use_state_orchestration: false
          branch: ${{ inputs.dbt_branch }}
          project_dir: dbt_projects/snowflake
          shallow_clone_dirs: dbt_projects/snowflake
        depends_on: []
        name: dbt_
        connection: dbt_snowflake_56978
        operation_metadata:
          51750728-23d1-4000-ae6d-b3154ef8f871:
            integration: SNOWFLAKE
            connection: snowflake_tables_24182
      56504d03-8768-4ed3-a39b-781bc7e7ecd7:
        integration: SNOWFLAKE
        integration_job: SNOWFLAKE_RUN_QUERY
        parameters:
          statement: EXECUTE TASK KICK_OFF_TASK;
          set_outputs: false
        depends_on: []
        name: EXECUTE TASK
        connection: ${{ ENV.SNOWFLAKE_CONNECTION }}
    depends_on:
    - ef92b6c1-86d3-4145-a8c4-c6f5ba6b2a45
    - 45f93d3c-5877-4a77-b9ce-7bb8eaffb956
    name: ''
  45f93d3c-5877-4a77-b9ce-7bb8eaffb956:
    tasks:
      e45c8297-fe82-4d69-8dc7-dce300b9526e:
        integration: AIRBYTE_CLOUD
        integration_job: AIRBYTE_CLOUD_JOB
        parameters:
          connection_id: some_id
          job_type: sync
        depends_on: []
        name: Airbyte
        treat_failure_as_warning: true
    depends_on: []
    name: ''
schedule:
- name: Production
  cron: 0 1 ? * * *
  timezone: Europe/London
  environment: 2789285b-7f8b-4889-9d67-f7f111eb27a8
sensors:
  b2b46b20-0050-4313-a1fa-b5e7ce1d212b:
    name: Sensor trigger
    cron: 0 8 ? * * *
    timezone: Europe/London
    timeout_mins: 240
    checks:
      Snowflake:
        integration: SNOWFLAKE
        sensor_type: SNOWFLAKE_QUERY
        parameters:
          query: select * from kesko_customer where current_date = today()
  daf904b7-5df7-4fb8-bebb-55eb19948df6:
    name: Sensor trigger (check S3)
    cron: 0 6 ? * * *
    timezone: Europe/London
    timeout_mins: 360
    checks:
      Check S3 Bucket:
        integration: AWS_S3
        sensor_type: AWS_S3_FILE
        parameters:
          bucket_name: football
          prefix: provider
webhook:
  enabled: false
inputs:
  dbt_command:
    type: string
    default: build
  dbt_branch:
    type: string
    default: main
  environment:
    type: string
    default: ${{ ENV.ENV_NAME }}
