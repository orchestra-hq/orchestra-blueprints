version: v1
name: 'Linear teams to MotherDuck #dlt #motherduck #linear'
pipeline:
  7b2c9d51-3e4f-4a62-8c0d-1f5a6b7c8d90:
    tasks:
      9e8f7a61-2b3c-4d5e-6f70-8a1b2c3d4e5f:
        integration: PYTHON
        integration_job: PYTHON_EXECUTE_SCRIPT
        parameters:
          package_manager: PIP
          python_version: '3.11'
          build_command: pip install -r requirements.txt
          source: GIT
          branch: ${{ inputs.branch }}
          command: python -m linear_teams_pipeline
          project_dir: python/dlt
          shallow_clone_dirs: python/dlt
          environment_variables: '{
            "LINEAR_TEAMS_SINCE_DAYS": "${{ inputs.since_days }}",
            "LINEAR_TEAMS_MD_STAGING_DATABASE": "${{ inputs.md_staging_database }}",
            "LINEAR_TEAMS_MD_PROD_DATABASE":    "${{ inputs.md_prod_database }}",
            "LINEAR_TEAMS_MD_DATASET":          "${{ inputs.md_dataset }}"
            }'
          set_outputs: true
        depends_on: []
        name: Run linear teams dlt
        connection: python__production__blueprints__19239
    depends_on: []
    name: ''
  4c6d8e02-5a7b-4f91-9d23-3e5b7c9a1f04:
    tasks:
      1a2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d:
        integration: MOTHERDUCK
        integration_job: MOTHERDUCK_EXECUTE_QUERY
        parameters:
          query: 'CREATE SNAPSHOT ${{ inputs.snapshot_name }} OF ${{ inputs.md_staging_database }}'
          set_outputs: false
        depends_on: []
        name: Create snapshot of staging
    depends_on:
    - 7b2c9d51-3e4f-4a62-8c0d-1f5a6b7c8d90
    name: ''
  2f5a8c93-6b1d-4e74-8a09-5d2f7b3c6e18:
    tasks:
      6d7e8f90-1a2b-3c4d-5e6f-7a8b9c0d1e2f:
        integration: MOTHERDUCK
        integration_job: MOTHERDUCK_EXECUTE_QUERY
        parameters:
          query: "COPY FROM DATABASE ${{ inputs.md_staging_database }}  (OVERWRITE, SNAPSHOT_NAME ${{ inputs.snapshot_name }}, OVERWRITE) TO ${{ inputs.md_prod_database }}"
          set_outputs: false
        depends_on: []
        name: Promote staging to prod
    depends_on:
    - 4c6d8e02-5a7b-4f91-9d23-3e5b7c9a1f04
    name: ''
inputs:
  branch:
    type: string
    default: main
  since_days:
    type: string
    default: ''
  md_staging_database:
    type: string
    default: my_db_staging
  md_prod_database:
    type: string
    default: my_db
  md_dataset:
    type: string
    default: dlt_linear_teams
  snapshot_name:
    type: string
    default: dlt_linear_teams_pre_20260603
