version: v1
name: 'Demo: Claude Agent'
pipeline:
  3d8b1da7-1ff3-413c-b4ea-6cc26f7f0437:
    tasks:
      575ada33-f75c-46cf-83fb-fd5dfd086905:
        integration: PYTHON
        integration_job: PYTHON_EXECUTE_SCRIPT
        parameters:
          package_manager: UV
          python_version: '3.12'
          build_command: uv init && uv add claude-agent-sdk
          environment_variables: '{

            "PROMPT": "${{ inputs.prompt }}",

            "BRANCH_NAME": "${{ inputs.branch_name }}",

            "TOOLS": "${{ inputs.tools }}"

            }'
          set_outputs: false
          source: GIT
          command: python agent.py
          branch: feat/claude-agent
          project_dir: python/claude_agent
          shallow_clone_dirs: python/claude_agent
        depends_on: []
        name: Run Claude Agent
        connection: claude_agent_32433
    depends_on: []
    name: ''
webhook:
  enabled: false
inputs:
  prompt:
    type: string
    default: 'Review utils.py for bugs that would cause crashes. Fix any issues you
      find. After making all necessary changes: 1. Run: git checkout -b {branch_name}
      2. Run: git add -u 3. Run: git commit -m "fix: automated fixes by Claude" 4.
      Run: git push origin {branch_name} 5. Run: gh pr create --title "{pr_title}"
      --body "## Changes\n\nAutomated fixes applied by Claude agent.\n\n### Files
      changed\n$(git diff main...HEAD --name-only)" --base main  Use the Bash tool
      to run each git/gh command.'
  branch_name:
    type: string
    default: test/claude-agent
  tools:
    type: string
    default: Read,Edit,Glob,Bash
