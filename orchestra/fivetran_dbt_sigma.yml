version: v1
name: 'Fivetran dbt to Sigma analytics #datadog #dbt #email #fivetran #sigma #slack
  #snowflake #teams'
pipeline:
  308a17c9-1fd6-4179-bdae-f36f0b146c57:
    tasks:
      f91f11bf-fb37-463d-8180-22febecc633d:
        integration: FIVETRAN
        integration_job: FIVETRAN_SYNC_ALL
        parameters:
          connector_id: faithfulness_coal
        depends_on: []
        name: Sync Oil Data
        alerts:
        - name: Slack complete test
          statuses:
          - ANY_COMPLETED
          destinations:
          - integration: SLACK
            destination: ${{ ENV.SLACK_ALERT }}
            connection_id: default_00000
        - name: Datadog test
          statuses:
          - SKIPPED
          destinations:
          - integration: DATADOG
            connection_id: datadog__prod__94010
            parameters:
              priority: 5
      a0d80e94-ec72-4b2a-abe9-a3a41d04b2d4:
        integration: FIVETRAN
        integration_job: FIVETRAN_SYNC_ALL
        parameters:
          connector_id: manual_carrier
        depends_on: []
        name: Sync CRM Data
    depends_on: []
    name: ''
  d48629ca-679b-4095-942d-89f8f79d7e95:
    tasks:
      21ce3ced-4acc-4380-b122-24806e6c4243:
        integration: DBT_CORE
        integration_job: DBT_CORE_EXECUTE
        parameters:
          commands: dbt  ${{ inputs.dbt_command }}
          package_manager: PIP
          python_version: '3.12'
          use_state_orchestration: true
          branch: ${{ inputs.dbt_branch }}
          project_dir: dbt_projects/snowflake
          shallow_clone_dirs: dbt_projects/snowflake
        depends_on: []
        name: Run Transformations
        connection: ${{ ENV.DBT_CORE_CONNECTION }}
        operation_metadata:
          73f8ea9d-05bb-48eb-910b-e54076ba8c8a:
            integration: SNOWFLAKE
            connection: snowflake__prod__80122
    depends_on:
    - 308a17c9-1fd6-4179-bdae-f36f0b146c57
    name: ''
  eb302e05-5d30-4698-98e4-3649adf07a0f:
    tasks:
      c9943b13-9f48-4f1b-bbc3-46771695deeb:
        integration: SIGMA
        integration_job: SIGMA_DATAMODEL_MATERIALIZATION
        parameters:
          datamodel_id: c177c9cc-8e0c-4fff-b605-d61be15c7b9f
          sheet_ids:
          - _qoLA7edEW
          - h2dzmi98x4
        depends_on: []
        name: Trigger Datamodel Refresh
        connection: sigma__dev__73579
      c2352f05-c77b-411d-bfc4-301336f8a085:
        integration: SIGMA
        integration_job: SIGMA_WORKBOOK_MATERIALIZATION
        parameters:
          workbook_id: 8784d84d-5cf3-4656-8629-f0484a1204b2
          sheet_ids:
          - xRCPUYX1rW
        depends_on: []
        name: Trigger Workbook
        connection: sigma__dev__73579
    depends_on:
    - d48629ca-679b-4095-942d-89f8f79d7e95
    name: ''
schedule:
- name: Staging trigger
  cron: 0 8 ? * * *
  timezone: Europe/London
  environment: dbfb4825-b265-40ac-8d36-18aded5c9487
webhook:
  enabled: false
inputs:
  dbt_command:
    type: string
    default: build
  dbt_branch:
    type: string
    default: main
  SLACK_ALERT:
    type: string
    default: alert-testing
alerts:
- name: Failures
  statuses:
  - FAILED
  destinations:
  - integration: EMAIL
    destination: hugolu87@gmail.com
- name: Teams alerts
  statuses:
  - ANY_COMPLETED
  destinations:
  - integration: MICROSOFT_TEAMS
    connection_id: migrated_teams_66347
