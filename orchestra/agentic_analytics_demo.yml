    tasks:
      76839da0-4a7a-4b5e-a7a7-474b41c924a7:
        integration: OPEN_AI
        integration_job: OPEN_AI_CHAT
        parameters:
          prompt: 'Provide a list of issues for this dbt project based on the log
            output of a failed run so that they can be fixed.


            * Identify the failing tests and their relevant models.

            * Inspect the model and relevant surrounding models that may provide context.

            * Understand the issue and ideate potential fixes.

            * If necessary, validate these fixes with potential context of similar
            issues found online.

            * Create a list of fixes to be applied to the codebase with full context
            of where and how to make these adjustments, including any additional dbt
            tests to add to confirm the new behaviour.


            Important:

            * We solely care about the test failures from this run, do not worry about
            deprecations, or anything at the top of the logs, just the failure output
            at the bottom from dbt.'
          model: gpt-5
          context: 'Logs: ${{ ORCHESTRA.PIPELINE_RUN_TASKS[''a3f6524f-9887-4e9e-a747-348b6c81997a''].OUTPUTS[''logs'']
            }}'
          instructions: 'Only return fixes for issues related to this dbt test failure.

            Ensure all fix strings do not contain any double quotes.

            Ensure all of the response is encoded in a way to be accepted as a single
            line string environment variable.

            Produce 1 fix per error, not per test failure, but use semantics to understand
            if the fixes address the same issue and just suggest the most likely fix
            or the one that best matches the style of the dbt project.'
          set_outputs: true
          return_text: false
          output_schema: "{\n  \"type\": \"object\",\n  \"properties\": {\n    \"\
            results\": {\n      \"type\": \"array\",\n      \"items\": {\n       \
            \ \"type\": \"object\",\n        \"properties\": {\n          \"id\":\
            \ { \"type\": \"integer\" },\n          \"text\": { \"type\": \"string\"\
            \ }\n        },\n        \"required\": [\"id\", \"text\"],\n        \"\
            additionalProperties\": false\n      }\n    }\n  },\n  \"required\": [\"\
            results\"],\n  \"additionalProperties\": false\n}"
        depends_on: []
        name: Diagnose dbt Error
        connection: openai__prod__72452
    depends_on:
    - downloadArtifactsTaskGroup
    name: group
