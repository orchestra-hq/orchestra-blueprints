            \ndef download_file(url: str, filename: str) -> str:\n    try:\n     \
            \   response = requests.get(url, headers={\"Authorization\": f\"Bearer\
            \ {api_key}\"})\n        response.raise_for_status()\n        return response.text\n\
            \    except requests.RequestException as e:\n        print(f\"Error downloading\
            \ {filename}: {e}\", file=sys.stderr)\n        raise\n\ndef main(pipeline_run_id:\
            \ str, task_run_id: str):\n    #\_Note: will not work with multiple command\
            \ dbt Core runs.\n    logs_url = f\"{DOWNLOAD_URL.format(pipeline_run_id,\
            \ task_run_id)}\"\n    try:\n        print(f\"Downloading logs from: {logs_url}\"\
            )\n        logs = download_file(logs_url, \"logs.txt\")\n        print(\"\
            Successfully downloaded logs\")\n        orchestra.set_output(\n     \
            \       name=\"logs\",\n            value=json.dumps(logs),\n        )\n\
            \        print(\"Successfully stored outputs in Orchestra\")\n    except\
            \ Exception as e:\n        print(f\"Script failed: {e}\", file=sys.stderr)\n\
            \        sys.exit(1)\n\n\nif __name__ == \"__main__\":\n    pipeline_run_id\
            \ = \"${{ ORCHESTRA.PIPELINE_RUN_ID }}\"\n    task_run_id = \"${{ ORCHESTRA.PIPELINE_RUN_TASKS['dbtCoreTask'].TASK_RUN_ID\
            \ }}\"\n    main(pipeline_run_id, task_run_id)"
        depends_on: []
        name: Download dbt Logs
    depends_on:
    - dbtCoreTaskGroup
    condition: ${{ task_groups['dbtCoreTaskGroup'].any().status == 'FAILED' }}
    name: Download Artifacts Task Group
