    tasks:
      a3f6524f-9887-4e9e-a747-348b6c81997a:
        integration: PYTHON
        integration_job: PYTHON_EXECUTE_SCRIPT
        parameters:
          package_manager: PIP
          python_version: '3.12'
          build_command: pip install requests
          set_outputs: true
          source: INLINE
          code: "import json\nimport os\nimport sys\n\nimport requests\nfrom orchestra_sdk.orchestra\
            \ import OrchestraSDK\n\nDOWNLOAD_URL = (\n \"https://app.getorchestra.io/api/engine/public/pipeline_runs/{}/task_runs/{}/logs/download?filename=1%2Fdebug_task\"\
