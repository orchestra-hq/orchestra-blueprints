version: v1
name: '[Agentic Analytics Demo] Daily ELT Pipeline'
pipeline:
  dltTaskGroup:
    tasks:
      61d69e95-1cda-4f87-aa43-1d2d88ce6a2a:
        integration: PYTHON
        integration_job: PYTHON_EXECUTE_SCRIPT
        parameters:
          package_manager: PIP
          python_version: '3.12'
          build_command: pip install -r requirements.txt
          set_outputs: false
          source: GIT
          command: python run.py motherduck
          project_dir: metadata_api
          shallow_clone_dirs: metadata_api
        depends_on: []
        name: Run DLT
        connection: python__production__blueprints__19239
    depends_on: []
    name: DLT Task Group
  dbtCoreTaskGroup:
    tasks:
      dbtCoreTask:
        integration: DBT_CORE
        integration_job: DBT_CORE_EXECUTE
        parameters:
          commands: 'dbt build --vars ''{"orchestra_source_schema": "orchestra_metadata_app"}'''
          package_manager: UV
          python_version: '3.12'
          use_state_orchestration: true
        depends_on: []
        name: dbt Core
        connection: dbt_core_metadata_motherduck_22791
    depends_on:
    - dltTaskGroup
    name: dbt Core Task Group
  lightdashTaskGroup:
    tasks:
      lightdashTask:
        integration: LIGHTDASH
        integration_job: LIGHTDASH_REFRESH_DASHBOARD
        parameters:
          dashboard_id: e61e7779-2f75-44c7-b425-22ee1fadb0e5
          invalidate_cache: false
        depends_on: []
        name: Lightdash Refresh
        connection: lightdash__metadata___motherduck__82302
    depends_on:
    - dbtCoreTaskGroup
    condition: ${{ task_groups['dbtCoreTaskGroup'].all().status == 'COMPLETED' }}
    name: Lightdash Task Group
  group:
    tasks:
      a20a8cde-2fb2-4d57-85c0-7ac798ab627f:
        integration: PYTHON
        integration_job: PYTHON_EXECUTE_SCRIPT
        parameters:
          package_manager: UV
          python_version: '3.12'
          build_command: ' uv init && uv add claude-agent-sdk'
          environment_variables: "{\n  \"TOOLS\": \"Read,Write,Edit,Glob,Bash,WebSearch,WebFetch\"\
            ,\n  \"GITHUB_REPO\": \"gthesheep-orchestra/dbt-orchestra-metadata\",\n\
            \  \"CLAUDE_PROMPT\": \"This dbt project has failed in this run, implement\
            \ a code fix via Pull Request in the gthesheep-orchestra/dbt-orchestra-metadata\
            \ Github repository, mark these pull requests as 'Failed dbt run fix'\
            \ followed by a description of the fix. The issue to fix is: ${{ MATRIX.issue_to_fix['text']\
            \ }}. Set the pull request link as the task output under key 'pull_request',\
            \ and the pull request number as 'pull_request_number', using the orchestra_set_outputs\
            \ tool.\",\n  \"MCP_SERVERS_JSON\": \"{\\\"github\\\":{\\\"type\\\":\\\
            \"http\\\",\\\"url\\\":\\\"https://api.githubcopilot.com/mcp\\\",\\\"\
            headers\\\":{\\\"Authorization\\\":\\\"Bearer ${GITHUB_TOKEN}\\\"}}}\"\
            \n}"
          set_outputs: true
          source: GIT
          command: python agent.py
          project_dir: python/claude_agent_mcp
          shallow_clone_dirs: python/claude_agent_mcp
        depends_on: []
        name: Data Eng Team
        connection: python__production__blueprints__19239
      0a1d6853-22b9-4c30-9409-01d6472ff3c2:
        integration: ORCHESTRA
        integration_job: APPROVAL
        parameters:
          message: 'Would you like to merge this pull request?


            ${{ ORCHESTRA.PIPELINE_RUN_TASKS[''a20a8cde-2fb2-4d57-85c0-7ac798ab627f''].OUTPUTS[''pull_request'']
            }}'
          approvers:
          - gary+prod@getorchestra.io
          message_integration: SLACK
          message_connection_id: default_00000
          message_destination: '#alert-demos'
        depends_on:
        - a20a8cde-2fb2-4d57-85c0-7ac798ab627f
        name: Merge Pull Request?
    depends_on:
    - 7260ed4e-047a-49fe-b41e-343e5e6f356b
    condition: ${{ task_groups['7260ed4e-047a-49fe-b41e-343e5e6f356b'].all().status
      == 'COMPLETED' }}
    name: group
    matrix:
      inputs:
        issue_to_fix: ${{ ORCHESTRA.PIPELINE_RUN_TASKS['76839da0-4a7a-4b5e-a7a7-474b41c924a7'].OUTPUTS['results']['results']
          }}
