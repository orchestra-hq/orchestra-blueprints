            \ \"type\": \"object\",\n        \"properties\": {\n          \"id\":\
            \ { \"type\": \"integer\" },\n          \"text\": { \"type\": \"string\"\
            \ }\n        },\n        \"required\": [\"id\", \"text\"],\n        \"\
