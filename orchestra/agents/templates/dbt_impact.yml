version: v1
name: '[AI AGENT WORKFLOW] dbt Core - Impact Analysis'
pipeline:
  fetch-manifests:
    tasks:
      default-manifest:
        integration: DBT_CORE
        integration_job: DBT_CORE_EXECUTE
        parameters:
          commands: dbt parse
          package_manager: UV
          python_version: '3.12'
          project_dir: dbt_projects/motherduck_s3
          shallow_clone_dirs: dbt_projects/motherduck_s3
          warehouse_identifier: NOEPBEQ-WP69376
        depends_on: []
        name: Collect default manifest
        connection: dbt_motherduck__prod__39243
      working-manifest:
        integration: DBT_CORE
        integration_job: DBT_CORE_EXECUTE
        parameters:
          commands: dbt parse
          package_manager: UV
          python_version: '3.12'
          branch: ${{ inputs.branch }}
          project_dir: dbt_projects/motherduck_s3
          shallow_clone_dirs: dbt_projects/motherduck_s3
          warehouse_identifier: NOEPBEQ-WP69376
        depends_on: []
        name: Collect working branch manifest
        connection: dbt_motherduck__prod__39243
    depends_on: []
    name: ''
  analyse-changes:
    tasks:
      analyse-diff:
        integration: OPEN_AI
        integration_job: OPEN_AI_CHAT
        parameters:
          prompt: Perform an impact analysis of the proposed dbt Core code changes.
            Generate a short summary alongside the analysis.
          model: gpt-5
          context: 'JSON diff: ${{ ORCHESTRA.PIPELINE_RUN_TASKS[''generate-diff''].OUTPUTS[''diff'']
            }}

            Operations: ${{ ORCHESTRA.PIPELINE_RUN_TASKS[''generate-diff''].OUTPUTS[''operations'']
            }}'
          instructions: 'You will receive a diff of 2 dbt Core manifest.json files.
            You are comparing the changed manifest against the latest production instance.
            The output message must be markdown text (we want formatted links, backticks,
            emojis, formatting tricks where possible) with literal newline characters,
            and no double quotes that are not escaped. Limit the output to 500 characters
            (excluding code blocks, which can be included in expand tags).


            Use the operations and assets we know about to help with the impact analysis.
            You can optionally link to pipeline run URLs: https://app.getorchestra.io/pipeline-runs/{pipeline_run_id}/lineage


            Make sure the response contains

            A) What columns if any are changed or added

            B) A list of the downstream columns mapped to the tables that may be affected.
            Note on each line whether the column name has been appropriately amended

            C) The final end tables that get effected (i.e. dbt tables that have no
            dependencies)'
          set_outputs: true
          return_text: false
          output_schema: 'body: str'
        depends_on: []
        name: Analyse changes
    depends_on:
    - process-manifests
    name: ''
  update-pr:
    tasks:
      post-pr-comment:
        integration: HTTP
        integration_job: HTTP_REQUEST
        parameters:
          path: /${{ inputs.repo }}/issues/${{ inputs.pr_number }}/comments
          custom_headers: '{

            "Accept": "application/vnd.github+json"

            }'
          set_outputs: false
          method: POST
          body: ${{ ORCHESTRA.PIPELINE_RUN_TASKS['analyse-diff'].OUTPUTS['results']
            }}
        depends_on: []
        name: Post to GitHub
        connection: http__github__22698
    depends_on:
    - analyse-changes
    name: ''
  process-manifests:
    tasks:
      generate-diff:
        integration: PYTHON
        integration_job: PYTHON_EXECUTE_SCRIPT
        parameters:
          package_manager: PIP
          python_version: '3.12'
          build_command: pip install deepdiff requests orchestra-sdk
          set_outputs: true
          source: INLINE
          code: "import os\nimport sys\nfrom typing import Callable\n\nimport requests\n\
            from deepdiff import DeepDiff\nfrom orchestra_sdk.orchestra import OrchestraSDK\n\
            \nDOWNLOAD_URL = \"https://app.getorchestra.io/api/engine/public/pipeline_runs/{}/task_runs/{}/artifacts/download?filename=manifest.json\"\
            \nMETADATA_API_URL = \"https://app.getorchestra.io/api/engine/public/{}\"\
            \napi_key = os.environ[\"ORCHESTRA_API_KEY\"]\norchestra = OrchestraSDK(api_key=api_key)\n\
            \n\ndef remove_created_at_recursively(obj):\n    if isinstance(obj, dict):\n\
            \        obj.pop(\"created_at\", None)\n        obj.pop(\"checksum\",\
            \ None)\n        # Recursively process all remaining values\n        for\
            \ value in obj.values():\n            remove_created_at_recursively(value)\n\
            \    elif isinstance(obj, list):\n        # Process each item in the list\n\
            \        for item in obj:\n            remove_created_at_recursively(item)\n\
            \n\ndef download_manifests(pipeline_run_id, default_branch_task_run_id,\
            \ working_branch_task_run_id):\n    default_manifest: dict | None = None\n\
            \    working_manifest: dict | None = None\n\n    for manifest_name, task_run_id\
            \ in [\n        (\"latest\", default_branch_task_run_id),\n        (\"\
            proposed\", working_branch_task_run_id),\n    ]:\n        download_url\
            \ = DOWNLOAD_URL.format(pipeline_run_id, task_run_id)\n        response\
            \ = requests.get(download_url, headers={\"Authorization\": f\"Bearer {api_key}\"\
            })\n\n        if manifest_name == \"latest\":\n            default_manifest\
            \ = response.json()\n        else:\n            working_manifest = response.json()\n\
            \n    if not default_manifest or not working_manifest:\n        print(\"\
            No manifests found\")\n        sys.exit(1)\n\n    for json_manifest in\
            \ (default_manifest, working_manifest):\n        json_manifest.pop(\"\
            metadata\")\n        json_manifest.pop(\"macros\")\n        json_manifest.pop(\"\
            docs\")\n        remove_created_at_recursively(json_manifest)\n\n    orchestra.set_output(\n\
            \        name=\"diff\",\n        value=DeepDiff(default_manifest, working_manifest,\
            \ ignore_order=True, verbose_level=2),\n    )\n\n\ndef fetch_paginated_data(\n\
            \    endpoint: str,\n    extract_keys: list[str] | None = None,\n    filter_func:\
            \ Callable | None = None,\n):\n    data = []\n    page = 1\n\n    while\
            \ True:\n        try:\n            response = requests.get(\n        \
            \        METADATA_API_URL.format(endpoint),\n                headers={\"\
            Authorization\": f\"Bearer {api_key}\"},\n                params={\"page\"\
            : page, \"per_page\": 100},\n            )\n            response.raise_for_status()\n\
            \n            results = response.json().get(\"results\", [])\n       \
            \     if not results:\n                break\n\n            for result\
            \ in results:\n                # Apply filter if provided\n          \
            \      if filter_func and not filter_func(result):\n                 \
            \   continue\n\n                # Extract specified keys or use full result\n\
            \                if extract_keys:\n                    extracted = {k:\
            \ result.get(k) for k in extract_keys}\n                    data.append(extracted)\n\
            \                else:\n                    data.append(result)\n\n  \
            \          page += 1\n\n        except requests.RequestException as e:\n\
            \            print(f\"Error fetching {endpoint} data on page {page}: {e}\"\
            )\n            break\n\n    return data\n\n\nif __name__ == \"__main__\"\
            :\n    pipeline_run_id = \"${{ ORCHESTRA.PIPELINE_RUN_ID }}\"\n    default_branch_task_run_id\
            \ = \"${{ ORCHESTRA.PIPELINE_RUN_TASKS['default-manifest'].TASK_RUN_ID\
            \ }}\"\n    working_branch_task_run_id = \"${{ ORCHESTRA.PIPELINE_RUN_TASKS['working-manifest'].TASK_RUN_ID\
            \ }}\"\n    download_manifests(pipeline_run_id, default_branch_task_run_id,\
            \ working_branch_task_run_id)\n\n    orchestra.set_output(\n        name=\"\
            operations\",\n        value=fetch_paginated_data(\n            \"operations\"\
            ,\n            [\n                \"assetExternalId\",\n             \
            \   \"operationStatus\",\n                \"pipelineRunId\",\n       \
            \         \"rowsAffected\",\n            ],\n            lambda x: x.get(\"\
            integration\") == \"DBT_CORE\" and x.get(\"assetExternalId\"),\n     \
            \   ),\n    )\n\n    orchestra.set_output(\n        name=\"assets\",\n\
            \        value=fetch_paginated_data(\n            \"assets\",\n      \
            \      [\n                \"externalId\",\n                \"assetName\"\
            ,\n                \"rowCount\",\n                \"bytes\",\n       \
            \         \"status\",\n            ],\n        ),\n    )\n"
        depends_on: []
        name: Download manifests -> generate diff
    depends_on:
    - fetch-manifests
    name: ''
webhook:
  enabled: true
inputs:
  branch:
    type: string
    default: demo-pr
  repo:
    type: string
    default: orchestra-hq/orchestra-blueprints
  pr_number:
    type: string
    default: '129'
