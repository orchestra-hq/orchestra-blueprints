version: v1
name: '[AI AGENT WORKFLOW] Personalised Slack reporting'
pipeline:
  stage-1:
    tasks:
      execute-snowflake-query:
        integration: SNOWFLAKE
        integration_job: SNOWFLAKE_RUN_QUERY
        parameters:
          statement: ${{ inputs.sql_query }}
          set_outputs: true
        depends_on: []
        name: Fetch data from warehouse
    depends_on: []
    name: ''
  stage-2:
    tasks:
      build-slack-message:
        integration: OPEN_AI
        integration_job: OPEN_AI_CHAT
        parameters:
          prompt: ${{ inputs.prompt }}
          model: gpt-5
          context: ${{ ORCHESTRA.PIPELINE_RUN_TASKS['execute-snowflake-query'].OUTPUTS['results']
            }}
          instructions: You must generate a JSON payload for Slack. It will be in
            the Slack Blocks format. Keep the number of blocks and content concise.
            Use nice formatting tricks where possible.
          set_outputs: true
          return_text: false
          output_schema: "Valid JSON for Slack webhook message:\n\n```json\n{\n  \"\
            blocks\": []\n}\n```"
        depends_on: []
        name: Generate Slack content
    depends_on:
    - stage-1
    name: ''
  fc628842-f19f-44e5-9177-f4e528493f7b:
    tasks:
      76a651ef-875f-4973-9a10-8c9dd8d33d3c:
        integration: SLACK
        integration_job: SEND_SLACK_MESSAGE
        parameters:
          channel_name: '#alert-demos'
          text: ${{ ORCHESTRA.PIPELINE_RUN_TASKS['build-slack-message'].OUTPUTS['results']
            }}
        depends_on: []
        name: Send to Slack
        connection: default_00000
    depends_on:
    - stage-2
    name: ''
webhook:
  enabled: true
inputs:
  sql_query:
    type: string
  prompt:
    type: string
