version: 2

models:
  - name: dim_pipelines
    description: |
      Dimension table containing pipeline definitions with aggregated execution statistics.
      One row per unique pipeline with counts of runs, success rates, and timing metrics.
    columns:
      - name: pipeline_id
        description: Unique identifier for the pipeline
      - name: pipeline_name
        description: Human-readable name of the pipeline
      - name: total_runs
        description: Total count of pipeline runs
      - name: successful_runs
        description: Count of successful pipeline runs
      - name: failed_runs
        description: Count of failed pipeline runs
      - name: cancelled_runs
        description: Count of cancelled pipeline runs
      - name: success_rate_pct
        description: Percentage of successful runs
      - name: failure_rate_pct
        description: Percentage of failed runs
      - name: first_run_at
        description: Timestamp of first pipeline run
      - name: last_run_at
        description: Timestamp of most recent pipeline run
      - name: avg_duration_seconds
        description: Average execution time in seconds
      - name: avg_duration_minutes
        description: Average execution time in minutes

  - name: dim_integrations
    description: |
      Dimension table containing integration types and their associated jobs with performance metrics.
      One row per unique integration+job combination.
    columns:
      - name: integration
        description: Type of integration (dbt, Fivetran, Snowflake, etc.)
      - name: integration_job
        description: Specific job within the integration
      - name: integration_key
        description: Combined key of integration and job
      - name: total_task_runs
        description: Total count of task runs for this integration
      - name: successful_task_runs
        description: Count of successful task runs
      - name: failed_task_runs
        description: Count of failed task runs
      - name: task_success_rate_pct
        description: Percentage of successful task runs
      - name: total_operations
        description: Total count of operations performed
      - name: total_rows_affected
        description: Total rows impacted across all operations
      - name: total_operation_duration_seconds
        description: Combined duration of all operations
      - name: avg_rows_affected
        description: Average rows affected per operation

  - name: dim_assets
    description: |
      Dimension table containing data asset metadata including classification, size, and dependencies.
      One row per unique data asset across the platform.
    columns:
      - name: asset_id
        description: Unique identifier for the asset
      - name: external_id
        description: External identifier in the source system
      - name: asset_name
        description: Name of the asset
      - name: asset_type
        description: Type of asset (TABLE, VIEW, DASHBOARD, etc.)
      - name: integration
        description: Integration where the asset resides
      - name: asset_status
        description: Current status of the asset
      - name: is_database_object
        description: Whether this is a database table or view
      - name: is_bi_asset
        description: Whether this is a BI/dashboard asset
      - name: is_query_asset
        description: Whether this is a query or dataset asset
      - name: upstream_dependency_count
        description: Count of upstream data dependencies
      - name: downstream_dependency_count
        description: Count of downstream consumers
      - name: row_count
        description: Number of rows in the asset
      - name: size_bytes
        description: Size in bytes
      - name: size_gb
        description: Size in gigabytes
      - name: created_at_utc
        description: When the asset was created
