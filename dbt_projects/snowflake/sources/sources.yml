
version: 2

sources:
  - name: base
    database: SNOWFLAKE_WORKING 
    schema: PUBLIC  
    tables:
      - name: hubspot_contacts_raw
        description: "Contacts from our CRM"
        columns:
          - name: vid
            description: "The primary key for this table"
            tests:
              - unique
              - not_null

  - name: snowflake
    database: SNOWFLAKE_SAMPLE_DATA 
    schema: tpcds_sf100tcl  
    tables:
      - name: customer
        description: "Snowflake sample customer dataset"
        columns:
          - name: C_CUSTOMER_ID
            description: "The primary key for this table"
            tests:
              - unique
              - not_null
      - name: catalog_sales
        description: "Snowflake sample customer dataset"
        columns:
          - name: CS_BILL_CUSTOMER_SK
            description: "The primary key for this table"
            #tests:
            #  - unique
            #  - not_null
          - name: CS_SOLD_DATE_SK
            description: "The date column for this table"
            #tests:
            #  - recent_julian_days:
            #      num_days: 1

  - name: fivetran
    database: FIVETRAN 
    schema: GOOGLE_SHEETS  
    tables:
      - name: oil_data
        description: "Snowflake sample customer dataset"
        config:
          freshness:
            warn_after: {count: 10, period: minute}
            error_after: {count: 30, period: minute}
          loaded_at_field:  _fivetran_synced
        columns:
          - name: timestamp
            description: "The timestamp for this table"
            tests:
              - not_null

