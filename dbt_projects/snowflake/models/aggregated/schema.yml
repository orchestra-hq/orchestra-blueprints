
version: 2

models:
  - name: marketing_data_aggregated
    config:
      tags:
        - massive_dag 
      freshness:
        build_after:
          count: 1
          period: hour
          updates_on: all

    description: "A staging model for orders"
    columns:
      - name: vid
        description: "The primary key for this table"
        tests:
          - not_null
  - name: product_usage_aggregated
    config:
      tags:
        - massive_dag 
    description: "A staging model for orders"
    columns:
      - name: vid
        description: "The primary key for this table"
        tests:
          - not_null
  - name: product_objects_aggregated
    config:
      tags:
        - broken 
    description: "A staging model for orders"
    columns:
      - name: vid
        description: "The primary key for this table"
        tests:
          - not_null
      - name: company
        description: "The primary key for this table"
        tests:
          - not_null:
              config:
                severity: warn
          - unique
  - name: snowflake_orders
    description: "A starter dbt model"
    columns:
      - name: BILL_CUTOMER_SK_ID
        description: "The id of the billed customer"
      - name: _pk
        description: "The primary key for this table"
        tests:
          - not_null
          - unique
      - name: ship_date
        description: "The shipment date"
        tests:
          - not_null
  - name: oil_data_aggregated
    description: "Aggregated Oil Field Production Data"
    columns:
      - name: _pk
        description: "The primary key for this table"
        tests:
          - not_null
          - unique

  # ---------------------------------------------------------------------------
  # Oil star schema - aggregated layer (marts built on the star)
  # ---------------------------------------------------------------------------
  - name: oil_production_by_site
    description: >-
      Production rolled up per site (fct_oil_measurement joined to dim_oil_site).
    columns:
      - name: site_key
        description: "Surrogate key from dim_oil_site."
        tests:
          - not_null
          - unique
      - name: site_name
        description: "Conformed site name."
        tests:
          - not_null
      - name: total_measurement
        description: "Sum of measurements for the site."
  - name: oil_production_daily
    description: >-
      Production rolled up per calendar date (fct_oil_measurement joined to
      dim_oil_date).
    columns:
      - name: date_key
        description: "Integer YYYYMMDD key from dim_oil_date."
        tests:
          - not_null
          - unique
      - name: total_measurement
        description: "Sum of measurements for the day."
