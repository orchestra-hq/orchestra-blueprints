              values: ["Moo"]
              config:
                severity: warn
                meta:
                  tags:
                    - "Data Tests"
                  owner: "gary@getorchestra.io"
                  channel: "#alert-testing"
                  subscribers:
                    - "gary@getorchestra.io"

  - name: products
    config:
      tags: ['daily', 'test']
    description: "Cleaned Google Analytics Events"
    columns:
      - name: _pk
        description: "The primary key for this table"
